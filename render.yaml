services:
  - type: web
    name: Vaultspace-AI
    runtime: static
    buildCommand: npm ci --include=dev && npm run check
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22"
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(self), microphone=(self), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
